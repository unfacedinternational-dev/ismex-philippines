<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISMEX PHILIPPINES</title>
    <style>
        /* CSS FIX: Standard format only */
        body, html { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #0e1117; 
            height: 100%; 
        }

        .mask-container {
            position: absolute;
            top: 0; 
            left: 0;
            width: 100%;
            /* Hides the Streamlit footer/logo */
            height: calc(100% - 50px); 
            overflow: hidden;
        }

        iframe {
            width: 100%;
            /* Pushes the app content up so the footer is out of view */
            height: calc(100% + 50px); 
            border: none;
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ff88;
            font-family: sans-serif;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div id="loading">Connecting to Secure Server...</div>
    <div class="mask-container">
        <iframe id="main-app" src="" allow="clipboard-read; clipboard-write"></iframe>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const ref = urlParams.get('ref');

        /* TARGET URL UPDATE: 
           This now points to your new 'ismex-philippines' deployment.
        */
        let targetURL = "https://ismex-philippines.streamlit.app/?embed=true";

        // Pass the referral code if it exists in the URL
        if (ref) {
            targetURL += "&ref=" + encodeURIComponent(ref);
        }

        document.getElementById('main-app').src = targetURL;
    </script>
</body>
</html>
